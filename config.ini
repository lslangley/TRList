# Configuration file for Transit Royale Scraper
# Modify these settings as needed

[SCRAPER]
# URL to scrape
url = https://help.transitapp.com/article/436-transit-agencies-gifting-royale-to-their-riders

# Request timeout in seconds
timeout = 10

# Enable/disable scraping
enabled = True

# Retry attempts if scrape fails
retry_attempts = 3

[SCHEDULER]
# Day to run (0=Monday, 1=Tuesday, etc.)
day = 0

# Hour to run (0-23 in 24-hour format)
hour = 10

# Minute to run (0-59)
minute = 0

# Timezone (e.g., US/Pacific, US/Eastern, US/Central, UTC)
timezone = US/Pacific

# Enable/disable scheduler
enabled = True

[OUTPUT]
# CSV file location (relative to script directory or absolute path)
csv_file = transit_agencies.csv

# JSON file location
json_file = transit_agencies.json

# HTML dashboard file location
html_file = index.html

# Log file for scraper
scraper_log = scrape_log.txt

# Log file for scheduler
scheduler_log = scheduler_log.txt

[DASHBOARD]
# Regenerate dashboard after each scrape
auto_regenerate = True

# Website title
title = Transit App Royale Agencies

# Website description
description = Interactive directory of transit agencies providing free Royale subscriptions

[NOTIFICATIONS]
# Send email on successful scrape
email_on_success = False

# Send email on failure
email_on_failure = False

# Email addresses (comma-separated)
email_recipients = user@example.com

# SMTP server
smtp_server = smtp.gmail.com

# SMTP port
smtp_port = 587

# Email sender address
email_from = your_email@gmail.com

# Email sender password
email_password = your_app_password
